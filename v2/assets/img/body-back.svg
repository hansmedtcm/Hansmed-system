<?xml version="1.0" encoding="UTF-8"?>
<!--
  HansMed body chart — posterior (back) view.
  Mirror of anterior with spine line, scapulae, and gluteal cleft.
  To replace with a custom reference image, drop a PNG named
  body-back.png into this directory — the consult panel picks it
  up automatically.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 612" aria-hidden="true">
  <defs>
    <linearGradient id="skin-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fefdfa"/>
      <stop offset="1" stop-color="#f5f0e7"/>
    </linearGradient>
  </defs>

  <!-- Silhouette outline (same as front, symmetric from the back) -->
  <path fill="url(#skin-b)" stroke="#2a2a2a" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" d="
    M140 18
    C160 18 177 34 177 58
    C177 72 173 82 168 89
    L166 102
    C166 108 168 112 173 115
    L188 121
    C206 127 222 138 230 154
    L244 188 L252 228 L257 268
    L257 300 L254 326
    C254 336 258 346 262 352
    C266 358 268 366 266 374
    C264 382 256 388 248 386
    C240 384 236 376 236 368
    L234 340
    L228 306 L222 270 L214 234
    L210 262 L208 298 L210 332
    C210 354 208 372 204 388
    L198 430 L192 484 L188 540
    L184 572
    C186 582 184 588 178 592
    L172 598
    C168 602 162 602 158 598
    L154 592
    C152 588 150 582 152 572
    L152 540
    L148 478 L144 420 L140 362
    L136 420 L132 478 L128 540
    L128 572
    C130 582 128 588 126 592
    L122 598
    C118 602 112 602 108 598
    L102 592
    C96 588 94 582 96 572
    L92 540 L88 484 L82 430 L76 388
    C72 372 70 354 70 332
    L72 298 L70 262 L66 234
    L58 270 L52 306 L46 340
    L44 368
    C44 376 40 384 32 386
    C24 388 16 382 14 374
    C12 366 14 358 18 352
    C22 346 26 336 26 326
    L23 300 L23 268
    L28 228 L36 188 L50 154
    C58 138 74 127 92 121
    L107 115
    C112 112 114 108 114 102
    L112 89
    C107 82 103 72 103 58
    C103 34 120 18 140 18 Z
  "/>

  <!-- Back-specific internal hint lines -->
  <g opacity="0.22" stroke="#5a5a5a" stroke-width="0.8" fill="none" stroke-linecap="round">
    <!-- Hairline / skull base -->
    <path d="M115 88 Q140 94 165 88"/>
    <!-- C7 vertebra -->
    <circle cx="140" cy="110" r="1.2" fill="#5a5a5a"/>
    <!-- Spine — runs from cervical to sacrum -->
    <line x1="140" y1="112" x2="140" y2="340" stroke-dasharray="4 3"/>
    <!-- Scapulae -->
    <path d="M108 138 L128 182 L118 198 L100 170 Z"/>
    <path d="M172 138 L152 182 L162 198 L180 170 Z"/>
    <!-- Trapezius outline -->
    <path d="M108 116 Q140 128 172 116"/>
    <!-- Latissimus fold -->
    <path d="M96 220 Q108 248 112 270"/>
    <path d="M184 220 Q172 248 168 270"/>
    <!-- Lumbar dimples (Venus dimples) -->
    <circle cx="126" cy="318" r="1.4" fill="#5a5a5a" opacity="0.5"/>
    <circle cx="154" cy="318" r="1.4" fill="#5a5a5a" opacity="0.5"/>
    <!-- Gluteal cleft + rounded buttocks -->
    <path d="M140 338 L140 382"/>
    <path d="M110 340 Q100 360 112 384 Q126 400 140 382"/>
    <path d="M170 340 Q180 360 168 384 Q154 400 140 382"/>
    <!-- Hamstring separation hint -->
    <line x1="116" y1="420" x2="122" y2="478"/>
    <line x1="164" y1="420" x2="158" y2="478"/>
    <!-- Popliteal crease (back of knee) -->
    <path d="M114 478 Q120 482 126 478"/>
    <path d="M154 478 Q160 482 166 478"/>
    <!-- Calf muscle belly -->
    <path d="M112 498 Q118 520 116 540"/>
    <path d="M168 498 Q162 520 164 540"/>
    <!-- Achilles tendon hint -->
    <line x1="119" y1="558" x2="120" y2="580"/>
    <line x1="161" y1="558" x2="160" y2="580"/>
    <!-- Elbow creases -->
    <path d="M48 258 Q54 262 60 258"/>
    <path d="M220 258 Q226 262 232 258"/>
  </g>
</svg>
