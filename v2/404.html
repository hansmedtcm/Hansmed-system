<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · HansMed</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/tcm.css">

<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: var(--s-6); }
  .err-wrap { max-width: 500px; text-align: center; }
  .err-code { font-family: var(--font-serif); font-size: 8rem; font-weight: 300; color: var(--gold); line-height: 1; margin-bottom: var(--s-2); }
  .err-zh { font-family: var(--font-zh); font-size: var(--text-xl); color: var(--stone); margin-bottom: var(--s-4); }
  .err-title { font-family: var(--font-serif); font-size: var(--text-2xl); color: var(--ink); margin-bottom: var(--s-3); }
  .err-text { color: var(--stone); margin-bottom: var(--s-6); line-height: var(--leading-relaxed); }
  .err-actions { display: flex; gap: var(--s-3); justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
  <div class="err-wrap">
    <div class="err-code">404</div>
    <div class="err-zh">頁面未找到</div>
    <h1 class="err-title">Page Not Found</h1>
    <p class="err-text">The page you're looking for doesn't exist or has been moved. If you followed a link from an email, it may have expired.</p>
    <div class="err-actions">
      <a href="index.html" class="btn btn--primary">← Back to Home</a>
      <a href="mailto:support@hansmed.com" class="btn btn--outline">Contact Support</a>
    </div>
  </div>
</body>
</html>
