name: CI

# Triggers on every push and PR — fast feedback for the small team.
# Three jobs:
#   1. backend-tests   — PHPUnit against a MySQL service container loaded
#                        from backend/database/schema.sql (the source of
#                        truth for HansMed's database shape; raw MySQL DDL
#                        rather than Laravel migrations).
#   2. frontend-syntax — node --check on every JS file under assets/.
#   3. gitleaks        — credential-leak scan, defence in depth to the
#                        local pre-commit hook in .githooks/pre-commit.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel earlier in-flight runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend: PHPUnit on Laravel 11 / PHP 8.3 against MySQL 8.0
  #
  # The schema lives in backend/database/schema.sql (raw MySQL DDL —
  # InnoDB engine, BIGINT UNSIGNED, ENUM types, JSON columns), so the
  # test database is real MySQL loaded from that file. RefreshDatabase
  # would re-run Laravel migrations (only 5 exist; the other ~25 tables
  # would be missing) so we use DatabaseTransactions instead: each test
  # runs inside a transaction that rolls back at teardown.
  # ─────────────────────────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: hansmed_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -ptestroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, openssl, pdo, pdo_mysql, mysqli, tokenizer, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: |
            backend/vendor
            ~/.cache/composer
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Composer install
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Wait for MySQL to be healthy
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -P3306 -uroot -ptestroot --silent 2>/dev/null; then
              echo "MySQL is up"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "MySQL never became healthy"
          exit 1

      - name: Load schema.sql into test database
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -ptestroot hansmed_test < database/schema.sql
          # Verify a known table exists post-load
          mysql -h127.0.0.1 -P3306 -uroot -ptestroot hansmed_test -e "SHOW TABLES;" | head -20

      - name: Generate APP_KEY (testing env reads from phpunit.xml; this is a sanity step)
        run: php artisan key:generate --env=testing --show

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox

  # ─────────────────────────────────────────────────────────────
  # Frontend: syntax check on every JS file under assets/
  # No bundler — vanilla JS — so this is the lightest viable check.
  # ─────────────────────────────────────────────────────────────
  frontend-syntax:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: node --check every .js file in assets/
        run: |
          set -e
          FAILED=0
          for f in $(find assets -name '*.js' 2>/dev/null); do
            if ! node --check "$f"; then
              echo "::error file=$f::JS syntax error"
              FAILED=1
            fi
          done
          [ "$FAILED" = 0 ]

  # ─────────────────────────────────────────────────────────────
  # gitleaks: catch any credential leak before it hits the public repo
  # Backup to the pre-commit hook (.githooks/pre-commit) — defence in depth.
  # ─────────────────────────────────────────────────────────────
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
