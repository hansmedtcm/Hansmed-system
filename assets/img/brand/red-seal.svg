<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="HansMed red seal stamp">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"></feTurbulence>
      <feColorMatrix values="0 0 0 0 0.75  0 0 0 0 0.22  0 0 0 0 0.17  0 0 0 0.3 0"></feColorMatrix>
      <feComposite in2="SourceGraphic" operator="in"></feComposite>
    </filter>
  </defs>
  <rect x="6" y="6" width="108" height="108" fill="#C0392B" rx="4"></rect>
  <rect x="6" y="6" width="108" height="108" fill="#C0392B" filter="url(#grain)" opacity="0.6" rx="4"></rect>
  <rect x="12" y="12" width="96" height="96" fill="none" stroke="#fff" stroke-width="2" rx="2"></rect>
  <text x="60" y="50" text-anchor="middle" fill="#fff" font-family="&#39;Noto Serif SC&#39;, serif" font-weight="700" font-size="28" letter-spacing="0.05em">漢方</text>
  <text x="60" y="88" text-anchor="middle" fill="#fff" font-family="&#39;Noto Serif SC&#39;, serif" font-weight="700" font-size="28" letter-spacing="0.05em">現代</text>
  <line x1="24" y1="60" x2="96" y2="60" stroke="#fff" stroke-width="1.2"></line>
</svg>