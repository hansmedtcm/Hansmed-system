services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hansmed
      MYSQL_USER: hansmed
      MYSQL_PASSWORD: hansmed
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    image: php:8.3-fpm-alpine
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "apk add --no-cache git unzip oniguruma-dev icu-dev libzip-dev mysql-client &&
             docker-php-ext-install pdo pdo_mysql bcmath intl zip &&
             php-fpm"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  queue:
    image: php:8.3-cli-alpine
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "apk add --no-cache git unzip oniguruma-dev libzip-dev mysql-client &&
             docker-php-ext-install pdo pdo_mysql bcmath zip &&
             php artisan queue:work --tries=3 --sleep=2"

volumes:
  mysql_data:
